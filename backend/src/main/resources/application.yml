server:
  port: 8080

spring:
  application:
    name: marketplace-backend

  data:
    mongodb:
      uri: ${MONGO_URI} 
      database: ${DATABASE}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000   # 24 hours

  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}

  platform:
    fee-percent: 5.0
    shipping-fee: 50.0
    best-seller-limit: 10

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.marketplace: DEBUG
    org.springframework.security: INFO